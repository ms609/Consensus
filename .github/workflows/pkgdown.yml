on:
  push:
    branches:
      - main
      - master
    paths:
      - 'DESCRIPTION'
      - '**pkgdown.yml'
      - '*.md'
      - 'inst/CITATION'
      - 'inst/*.bib'
      - 'man/**.Rd'
      - 'vignettes/**.Rmd'
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CONSTREE_TOKEN: ${{ secrets.CONSTREE_DEPLOY_TOKEN }}

    steps:
      - uses: ms609/actions/pkgdown@main
        with:
          # Neither setup-r nor pak reads DESCRIPTION's Additional_repositories
          # during dependency resolution, so TreeSearch (>= 2.0.0) (drat-only,
          # plus its dev TreeTools dep) is unfindable unless the drat is passed
          # explicitly here (mirrors what R-CMD-check needs).
          extra-repositories: https://ms609.github.io/packages/

      - name: Check if release version
        id: version-check
        run: |
          VERSION=$(grep '^Version:' DESCRIPTION | sed 's/Version: *//')
          # Release = exactly 3 numeric components (e.g. 2.2.0)
          # Dev     = 4+ components (e.g. 2.2.0.9001)
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+[.\-][0-9]+$'; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Release version: $VERSION"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Dev version: $VERSION"
          fi
        shell: bash

      - name: Replace dev docs with redirects
        if: steps.version-check.outputs.is_release == 'true'
        run: |
          TMPDIR=$(mktemp -d)
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"
          cd "$TMPDIR"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Remove old dev docs from git
          git rm -rf dev || true

          # Redirect template: strips /dev/ from the current URL
          cat > /tmp/redirect.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <script>window.location.replace(window.location.href.replace(/\/dev\//, "/"));</script>
          </head><body>
          <p>Redirecting to <a id="r">release documentation</a>…</p>
          <script>document.getElementById("r").href=window.location.href.replace(/\/dev\//, "/");</script>
          </body></html>
          EOF

          # Create a redirect stub for every HTML page in the release site
          find . -name '*.html' -not -path './dev/*' -not -path './.git/*' \
            | while read -r f; do
                rel="${f#./}"
                mkdir -p "dev/$(dirname "$rel")"
                cp /tmp/redirect.html "dev/$rel"
              done

          git add dev/
          git commit -m "Replace dev/ docs with redirects to release" || true
          git push origin gh-pages

          rm -rf "$TMPDIR"
        shell: bash

      - name: Push built site to constree.github.io
        run: |
          TMPDIR=$(mktemp -d)
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"
          cd "$TMPDIR"
          git remote add constree \
            "https://x-access-token:${CONSTREE_TOKEN}@github.com/constree/constree.github.io.git"
          git push constree gh-pages:gh-pages --force
          rm -rf "$TMPDIR"
        shell: bash

      - name: Replace ms609 gh-pages with redirect to constree.github.io
        run: |
          TMPDIR=$(mktemp -d)
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}.git" \
            "$TMPDIR"
          cd "$TMPDIR"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git rm -rf .

          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>ConsTree</title>
            <link rel="canonical" href="https://constree.github.io/">
            <meta http-equiv="refresh" content="0; url=https://constree.github.io/">
          </head>
          <body>
            <p>The ConsTree documentation has moved to
              <a href="https://constree.github.io/">constree.github.io</a>.</p>
          </body>
          </html>
          EOF

          # 404.html catches deep links, strips the /ConsTree prefix and redirects
          cat > 404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>ConsTree – Redirecting</title>
            <link rel="canonical" href="https://constree.github.io/">
            <script>
              var p = window.location.pathname.replace(/^\/ConsTree/, '') || '/';
              window.location.replace('https://constree.github.io' + p + window.location.search + window.location.hash);
            </script>
          </head>
          <body>
            <p>Redirecting to <a href="https://constree.github.io/">constree.github.io</a>…</p>
          </body>
          </html>
          EOF

          git add .
          git commit -m "Redirect to constree.github.io"
          git push origin gh-pages
          rm -rf "$TMPDIR"
        shell: bash
